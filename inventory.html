<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory - Blood Bank Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">🩸 Blood Bank MS</div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="donors.html">Donors</a>
      <a href="recipients.html">Recipients</a>
      <a href="inventory.html">Inventory</a>
    </nav>
  </header>

  <main class="container">
    <h1>Inventory</h1>
    <p class="subtitle">Blood stock levels and manual adjustments</p>

    <section class="stock-section">
      <h2>Current Stock</h2>
      <div class="stock-grid" id="invStockGrid">
        <!-- filled by JS -->
      </div>
    </section>

    <section class="form-card">
      <h2>Manual Stock Adjustment</h2>
      <p class="subtitle" style="margin-bottom:16px;">Use this for correcting wastage, expiry, or manual entries</p>
      <form id="adjustForm">
        <div class="form-grid">
          <div>
            <label for="adjBloodGroup">Blood Group</label>
            <select id="adjBloodGroup" required>
              <option value="">Select</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
            </select>
          </div>
          <div>
            <label for="adjType">Action</label>
            <select id="adjType" required>
              <option value="">Select</option>
              <option value="add">Add Stock</option>
              <option value="remove">Remove Stock</option>
            </select>
          </div>
          <div>
            <label for="adjUnits">Units</label>
            <input type="number" id="adjUnits" required min="1" placeholder="e.g. 5">
          </div>
        </div>
        <button type="submit">Apply Adjustment</button>
      </form>
    </section>
  </main>

  <footer>
    <p>Blood Bank Management System &copy; 2026</p>
  </footer>

  <script src="script.js"></script>
  <script src="inventory.js"></script>
</body>
</html>
